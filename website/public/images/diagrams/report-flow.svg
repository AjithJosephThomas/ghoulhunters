<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 380" role="img" aria-label="Report flow five steps">
  <style>
    text { font-family: Nunito, Roboto, sans-serif; font-size: 14px; fill: #1A2E1A; }
    .step { fill: #F7F3E8; stroke: #4A7C3F; stroke-width: 2; }
    .step-warn { fill: #fff5f5; stroke: #B71C1C; }
    .num { font-weight: bold; fill: #fff; font-size: 16px; }
    .circle { fill: #2D5016; }
    .title { font-size: 17px; font-weight: bold; fill: #2D5016; text-anchor: middle; }
  </style>
  <text x="200" y="28" class="title">What to do when you see a pest</text>
  <g transform="translate(40, 50)">
    <circle class="circle" cx="16" cy="16" r="16"/><text class="num" x="16" y="21" text-anchor="middle">1</text>
    <rect class="step" x="44" y="0" width="300" height="36" rx="8"/>
    <text x="194" y="23" text-anchor="middle">See pest in the river</text>
  </g>
  <g transform="translate(40, 100)">
    <circle class="circle" cx="16" cy="16" r="16"/><text class="num" x="16" y="21" text-anchor="middle">2</text>
    <rect class="step-warn" x="44" y="0" width="300" height="36" rx="8"/>
    <text x="194" y="23" text-anchor="middle" font-weight="bold">Do NOT remove it</text>
  </g>
  <g transform="translate(40, 150)">
    <circle class="circle" cx="16" cy="16" r="16"/><text class="num" x="16" y="21" text-anchor="middle">3</text>
    <rect class="step" x="44" y="0" width="300" height="48" rx="8"/>
    <text x="194" y="20" text-anchor="middle">Take a picture using the</text>
    <text x="194" y="38" text-anchor="middle">Bio Buddies mobile app</text>
  </g>
  <g transform="translate(40, 212)">
    <circle class="circle" cx="16" cy="16" r="16"/><text class="num" x="16" y="21" text-anchor="middle">4</text>
    <rect class="step" x="44" y="0" width="300" height="36" rx="8"/>
    <text x="194" y="23" text-anchor="middle">Tag the suspected pest</text>
  </g>
  <g transform="translate(40, 262)">
    <circle class="circle" cx="16" cy="16" r="16"/><text class="num" x="16" y="21" text-anchor="middle">5</text>
    <rect class="step" x="44" y="0" width="300" height="48" rx="8"/>
    <text x="194" y="20" text-anchor="middle">Submit the picture to the</text>
    <text x="194" y="38" text-anchor="middle">Bio Buddies server</text>
  </g>
  <text x="200" y="350" text-anchor="middle" font-size="12" fill="#4A5D4A">Protecting Brisbane River biodiversity</text>
</svg>
