<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" role="presentation" aria-hidden="true">
  <defs>
    <linearGradient id="ocean" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4A9EAE"/>
      <stop offset="100%" stop-color="#1A6B7C"/>
    </linearGradient>
    <linearGradient id="river" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4A9EAE"/>
      <stop offset="100%" stop-color="#1A6B7C"/>
    </linearGradient>
    <linearGradient id="riverSad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5a7a82"/>
      <stop offset="100%" stop-color="#3d5560"/>
    </linearGradient>
  </defs>

  <!-- Scene 12: Ocean + ship -->
  <g class="hero-scene hero-scene--travel">
    <rect width="800" height="200" fill="url(#ocean)" rx="12"/>
  </g>

  <!-- Scene 3: Brisbane river -->
  <g class="hero-scene hero-scene--river">
    <rect width="800" height="200" fill="#B8D4E8" rx="12"/>
    <path fill="url(#river)" d="M0 95 Q200 75 400 95 T800 95 L800 200 L0 200 Z"/>
    <path fill="#7CB342" opacity="0.5" d="M0 88 Q150 70 320 85 L0 85 Z"/>
    <path fill="#7CB342" opacity="0.5" d="M480 82 Q620 68 800 80 L800 88 L480 90 Z"/>
  </g>

  <!-- Scene 4: Low oxygen -->
  <g class="hero-scene hero-scene--impact">
    <rect width="800" height="200" fill="#8fa8b0" rx="12"/>
    <path fill="url(#riverSad)" d="M0 100 Q200 85 400 100 T800 100 L800 200 L0 200 Z"/>
  </g>

  <!-- Waves -->
  <g class="hero-waves">
    <path fill="rgba(255,255,255,0.2)" d="M0 118 Q40 108 80 118 T160 118 T240 118 T320 118 T400 118 T480 118 T560 118 T640 118 T720 118 T800 118 L800 130 L0 130 Z"/>
    <path fill="rgba(255,255,255,0.12)" d="M0 128 Q50 118 100 128 T200 128 T300 128 T400 128 T500 128 T600 128 T700 128 T800 128 L800 140 L0 140 Z"/>
  </g>

  <!-- Australia hint (phase 2) -->
  <g class="hero-australia">
    <ellipse cx="620" cy="55" rx="95" ry="70" fill="#A8D5A2" opacity="0.85"/>
    <text x="620" y="60" text-anchor="middle" font-family="Nunito,sans-serif" font-size="14" font-weight="700" fill="#2D5016">Australia</text>
  </g>

  <!-- Ship -->
  <g class="hero-ship" transform="translate(120, 72)">
    <path fill="#6B5344" d="M10 48 L110 48 L95 28 L25 28 Z"/>
    <rect x="35" y="18" width="50" height="12" rx="2" fill="#8B7355"/>
    <path fill="#F7F3E8" d="M0 48 Q60 58 120 48 L120 52 L0 52 Z"/>
    <!-- Hull clams -->
    <g class="hero-hull-clams">
      <ellipse cx="30" cy="44" rx="7" ry="5" fill="#E8B84A" stroke="#6B5344" stroke-width="1"/>
      <ellipse cx="48" cy="46" rx="6" ry="4" fill="#D4A017" stroke="#6B5344" stroke-width="1"/>
      <ellipse cx="65" cy="44" rx="7" ry="5" fill="#E8B84A" stroke="#6B5344" stroke-width="1"/>
      <ellipse cx="82" cy="46" rx="5" ry="4" fill="#C9A227" stroke="#6B5344" stroke-width="1"/>
    </g>
    <path stroke="#fff" stroke-width="2" fill="none" d="M95 30 L95 8 L100 8" opacity="0.6"/>
  </g>

  <!-- River clams (multiply in phase 3) -->
  <g class="hero-river-clams">
    <ellipse class="hero-clam c1" cx="120" cy="118" rx="8" ry="6" fill="#E8B84A" stroke="#6B5344" stroke-width="1"/>
    <ellipse class="hero-clam c2" cx="200" cy="122" rx="7" ry="5" fill="#D4A017" stroke="#6B5344" stroke-width="1"/>
    <ellipse class="hero-clam c3" cx="280" cy="115" rx="9" ry="6" fill="#E8B84A" stroke="#6B5344" stroke-width="1"/>
    <ellipse class="hero-clam c4" cx="360" cy="120" rx="8" ry="5" fill="#C9A227" stroke="#6B5344" stroke-width="1"/>
    <ellipse class="hero-clam c5" cx="440" cy="117" rx="7" ry="5" fill="#E8B84A" stroke="#6B5344" stroke-width="1"/>
    <ellipse class="hero-clam c6" cx="520" cy="121" rx="9" ry="6" fill="#D4A017" stroke="#6B5344" stroke-width="1"/>
    <ellipse class="hero-clam c7" cx="600" cy="116" rx="8" ry="5" fill="#E8B84A" stroke="#6B5344" stroke-width="1"/>
    <ellipse class="hero-clam c8" cx="680" cy="119" rx="7" ry="5" fill="#C9A227" stroke="#6B5344" stroke-width="1"/>
  </g>

  <!-- Native life -->
  <g class="hero-life hero-life--happy">
    <g transform="translate(160, 78)">
      <ellipse cx="0" cy="8" rx="14" ry="8" fill="#7CB342"/>
      <path stroke="#2D5016" stroke-width="2" fill="none" d="M0 0 Q-4 -12 0 -18 Q4 -12 0 0"/>
    </g>
    <g class="hero-fish" transform="translate(520, 95)">
      <ellipse cx="0" cy="0" rx="18" ry="10" fill="#4A9EAE"/>
      <path fill="#4A9EAE" d="M18 0 L28 -6 L28 6 Z"/>
      <circle cx="-6" cy="-2" r="2" fill="#1A2E1A"/>
    </g>
  </g>

  <g class="hero-life hero-life--sad">
    <g transform="translate(160, 82)" opacity="0.7">
      <ellipse cx="0" cy="8" rx="14" ry="6" fill="#8B9A6B"/>
      <path stroke="#4A5D4A" stroke-width="2" fill="none" d="M0 2 Q-6 10 0 14 Q6 10 0 2"/>
    </g>
    <g class="hero-fish" transform="translate(520, 100)" opacity="0.65">
      <ellipse cx="0" cy="0" rx="18" ry="10" fill="#6a858c"/>
      <path fill="#6a858c" d="M18 0 L28 -6 L28 6 Z"/>
      <circle cx="-6" cy="-2" r="2" fill="#333"/>
      <text x="0" y="4" text-anchor="middle" font-size="10" fill="#333">?</text>
    </g>
    <g class="hero-bubbles" opacity="0.4">
      <circle cx="300" cy="110" r="3" fill="none" stroke="#fff" stroke-width="1"/>
      <circle cx="310" cy="100" r="2" fill="none" stroke="#fff" stroke-width="1"/>
      <circle cx="400" cy="108" r="2.5" fill="none" stroke="#fff" stroke-width="1"/>
      <text x="400" y="85" font-family="Nunito,sans-serif" font-size="11" fill="#fff" opacity="0.9">less oxygen</text>
    </g>
  </g>

  <!-- Biosecurity badge -->
  <g class="hero-biosecurity-badge">
    <rect x="12" y="12" width="118" height="32" rx="16" fill="#B71C1C" opacity="0.92"/>
    <text x="71" y="33" text-anchor="middle" font-family="Nunito,sans-serif" font-size="12" font-weight="700" fill="#fff">Biosecurity risk</text>
  </g>
</svg>
